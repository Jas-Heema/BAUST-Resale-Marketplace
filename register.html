<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register - BAUST Resale</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="form-container">
        <h2>Register</h2>
        <div id="registerMessage"></div>
        <form id="registerForm">
            <div class="form-group"><label>Full Name</label><input type="text" name="name" required></div>
            <div class="form-group"><label>Student ID</label><input type="text" name="student_id" required></div>
            <div class="form-group"><label>Department</label><input type="text" name="department" required></div>
            <div class="form-group"><label>Batch</label><input type="text" name="batch" required></div>
            <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
            <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
            <div class="form-group"><label>Confirm Password</label><input type="password" name="confirm_password" required></div>
            <button type="submit" class="btn">Register</button>
        </form>
        <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
    <script src="assets/js/app.js"></script>
</body>
</html>
