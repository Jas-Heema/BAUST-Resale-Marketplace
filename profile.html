<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Profile - BAUST Resale</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .profile-avatar { text-align: center; margin-bottom: 1rem; }
        .profile-avatar img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); }
        .profile-info p { margin: 0.5rem 0; }
        .btn-group { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
        .preview-image { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-top: 10px; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .warning-card {
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid #ef4444;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
        }
        .warning-card h4 {
            color: #ef4444;
            margin-bottom: 0.5rem;
        }
        .warning-message {
            margin: 0.5rem 0;
        }
        .warning-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .warnings-section {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }
        .no-warnings {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="index.html">BAUST Resale</a></div>
        <div class="nav-links"></div>
    </nav>
    <div class="form-container" style="max-width: 700px;">
        <h2>My Profile</h2>
        <div id="profileMessage"></div>
        
        <!-- View Mode -->
        <div id="profileView">
            <div class="profile-avatar">
                <img id="profilePic" src="assets/uploads/default.jpg" alt="Profile Picture">
            </div>
            <div class="profile-info">
                <p><strong>Name:</strong> <span id="displayName"></span></p>
                <p><strong>Student ID:</strong> <span id="displayStudentId"></span></p>
                <p><strong>Department:</strong> <span id="displayDepartment"></span></p>
                <p><strong>Batch:</strong> <span id="displayBatch"></span></p>
                <p><strong>Email:</strong> <span id="displayEmail"></span></p>
                <p><strong>Rating:</strong> <span id="displayRating">0</span> / 5</p>
                <p><strong>Member since:</strong> <span id="displayCreated"></span></p>
                <div class="btn-group">
                    <button id="editProfileBtn" class="btn">Edit Profile</button>
                    <button id="uploadPictureBtn" class="btn">Change Picture</button>
                </div>
            </div>
        </div>
        
        <!-- Warnings Section -->
        <div class="warnings-section">
            <h3><i class="fas fa-exclamation-triangle" style="color: #ef4444;"></i> Warnings & Notices</h3>
            <div id="warningsList">
                <div class="no-warnings">Loading warnings...</div>
            </div>
        </div>
        
        <!-- Edit Mode -->
        <div id="profileEdit" style="display:none;">
            <form id="profileForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" id="editName" required>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" name="department" id="editDepartment" required>
                </div>
                <div class="form-group">
                    <label>Batch</label>
                    <input type="text" name="batch" id="editBatch" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" id="editEmail" required>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn">Save Changes</button>
                    <button type="button" id="cancelEditBtn" class="btn btn-danger">Cancel</button>
                </div>
            </form>
        </div>
        
        <!-- Upload Picture Mode -->
        <div id="pictureUpload" style="display:none;">
            <form id="uploadPicForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Profile Picture</label>
                    <input type="file" name="profile_picture" id="profilePictureInput" accept="image/jpeg,image/png,image/jpg,image/gif,image/webp">
                    <small>Max 2MB. Allowed: JPG, PNG, GIF, WEBP</small>
                </div>
                <div id="imagePreview" style="margin: 10px 0; text-align: center;"></div>
                <div class="btn-group">
                    <button type="submit" class="btn">Upload Picture</button>
                    <button type="button" id="cancelUploadBtn" class="btn btn-danger">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="assets/js/app.js"></script>
    <script>
        let currentUserData = null;
        
        async function loadProfileData() {
            try {
                const data = await fetchAPI('api/get_user.php');
                if (data.loggedIn) {
                    currentUserData = data.user;
                    document.getElementById('displayName').innerText = data.user.name || 'N/A';
                    document.getElementById('displayStudentId').innerText = data.user.student_id || 'N/A';
                    document.getElementById('displayDepartment').innerText = data.user.department || 'N/A';
                    document.getElementById('displayBatch').innerText = data.user.batch || 'N/A';
                    document.getElementById('displayEmail').innerText = data.user.email || 'N/A';
                    document.getElementById('displayRating').innerText = data.user.rating || '0';
                    document.getElementById('displayCreated').innerText = data.user.created_at ? new Date(data.user.created_at).toDateString() : 'N/A';
                    
                    // Set profile picture
                    if (data.user.profile_picture && data.user.profile_picture !== 'default.jpg') {
                        document.getElementById('profilePic').src = 'assets/uploads/' + data.user.profile_picture;
                    } else {
                        document.getElementById('profilePic').src = 'assets/uploads/default.jpg';
                    }
                    
                    // Pre-fill edit fields
                    document.getElementById('editName').value = data.user.name || '';
                    document.getElementById('editDepartment').value = data.user.department || '';
                    document.getElementById('editBatch').value = data.user.batch || '';
                    document.getElementById('editEmail').value = data.user.email || '';
                } else {
                    window.location.href = 'login.html';
                }
            } catch(err) {
                document.getElementById('profileMessage').innerHTML = `<div class="error">${err.message}</div>`;
            }
        }
        
        // Load warnings for this user
        async function loadWarnings() {
            const container = document.getElementById('warningsList');
            try {
                const warnings = await fetchAPI('api/get_my_warnings.php');
                
                if (!warnings || warnings.length === 0) {
                    container.innerHTML = '<div class="no-warnings"><i class="fas fa-check-circle"></i> No warnings received. Keep up the good behavior!</div>';
                    return;
                }
                
                container.innerHTML = warnings.map(w => `
                    <div class="warning-card">
                        <h4><i class="fas fa-exclamation-triangle"></i> Warning from Admin</h4>
                        <div class="warning-message">${escapeHtml(w.warning_message)}</div>
                        <div class="warning-meta">
                            Issued by: ${escapeHtml(w.issued_by_name)}<br>
                            Date: ${new Date(w.created_at).toLocaleString()}
                        </div>
                    </div>
                `).join('');
            } catch(e) {
                console.error('Error loading warnings:', e);
                container.innerHTML = '<div class="no-warnings">Unable to load warnings</div>';
            }
        }
        
        // Edit profile button
        document.getElementById('editProfileBtn').onclick = () => {
            document.getElementById('profileView').style.display = 'none';
            document.getElementById('profileEdit').style.display = 'block';
            document.getElementById('pictureUpload').style.display = 'none';
            document.getElementById('profileMessage').innerHTML = '';
        };
        
        document.getElementById('cancelEditBtn').onclick = () => {
            document.getElementById('profileView').style.display = 'block';
            document.getElementById('profileEdit').style.display = 'none';
        };
        
        // Save profile changes
        document.getElementById('profileForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            try {
                const result = await fetchAPI('api/update_profile.php', { method: 'POST', body: formData });
                showToast(result.message || 'Profile updated!', 'success');
                await loadProfileData();
                document.getElementById('profileView').style.display = 'block';
                document.getElementById('profileEdit').style.display = 'none';
            } catch(err) {
                document.getElementById('profileMessage').innerHTML = `<div class="error">${err.message}</div>`;
            }
        };
        
        // Upload picture button
        document.getElementById('uploadPictureBtn').onclick = () => {
            document.getElementById('profileView').style.display = 'none';
            document.getElementById('pictureUpload').style.display = 'block';
            document.getElementById('profileEdit').style.display = 'none';
            document.getElementById('profileMessage').innerHTML = '';
            document.getElementById('imagePreview').innerHTML = '';
            document.getElementById('profilePictureInput').value = '';
        };
        
        document.getElementById('cancelUploadBtn').onclick = () => {
            document.getElementById('profileView').style.display = 'block';
            document.getElementById('pictureUpload').style.display = 'none';
            document.getElementById('imagePreview').innerHTML = '';
        };
        
        // Image preview
        document.getElementById('profilePictureInput').addEventListener('change', function(e) {
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = '';
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const img = document.createElement('img');
                    img.src = ev.target.result;
                    img.className = 'preview-image';
                    preview.appendChild(img);
                };
                reader.readAsDataURL(this.files[0]);
            }
        });
        
        // Submit picture upload
        document.getElementById('uploadPicForm').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Uploading...';
            
            const formData = new FormData(e.target);
            try {
                const result = await fetchAPI('api/upload_profile_picture.php', { 
                    method: 'POST', 
                    body: formData 
                });
                showToast(result.message || 'Profile picture updated!', 'success');
                await loadProfileData();
                document.getElementById('profileView').style.display = 'block';
                document.getElementById('pictureUpload').style.display = 'none';
                document.getElementById('imagePreview').innerHTML = '';
            } catch(err) {
                document.getElementById('profileMessage').innerHTML = `<div class="error">${err.message}</div>`;
                showToast(err.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        };
        
        // Load everything on page load
        loadProfileData();
        loadWarnings();
    </script>
</body>
</html>
