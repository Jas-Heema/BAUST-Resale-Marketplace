<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>User Profile - BAUST Resale</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .rating-stars { color: #fbbf24; margin-bottom: 0.5rem; }
        .review-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
        .review-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-weight: bold; }
        .review-rating { color: #fbbf24; }
        .review-comment { margin-top: 0.5rem; color: var(--text-secondary); }
        .review-meta { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem; }
    </style>
</head>
<body>
    <nav class="navbar"><div class="nav-brand"><a href="index.html">BAUST Resale</a></div><div class="nav-links"></div></nav>
    <div class="container">
        <div class="form-container" style="max-width: 800px;">
            <h2>User Profile</h2>
            <div id="profileView">
                <div style="text-align:center; margin-bottom:1rem;">
                    <img id="profilePic" src="assets/uploads/default.jpg" style="width:120px; height:120px; border-radius:50%; object-fit:cover; border:3px solid var(--accent);">
                </div>
                <div class="profile-info">
                    <p><strong>Name:</strong> <span id="displayName"></span></p>
                    <p><strong>Department:</strong> <span id="displayDepartment"></span></p>
                    <p><strong>Batch:</strong> <span id="displayBatch"></span></p>
                    <p><strong>Rating:</strong> 
                        <span id="displayRating"></span> / 5 
                        <span id="ratingStars" class="rating-stars"></span>
                    </p>
                    <p><strong>Member since:</strong> <span id="displayCreated"></span></p>
                    <button id="reportUserBtn" class="btn btn-danger" style="margin-top:1rem;">Report User</button>
                </div>
            </div>
            
            <h3 style="margin-top: 2rem;">Reviews from buyers</h3>
            <div id="reviewsList">Loading reviews...</div>
        </div>
    </div>
    <script src="assets/js/app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        
        function displayStars(rating) {
            const full = Math.floor(rating);
            const half = rating % 1 >= 0.5;
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= full) stars += '★';
                else if (half && i === full+1) stars += '½';
                else stars += '☆';
            }
            return stars;
        }
        
        if (userId) {
            // Load user profile
            fetchAPI(`api/get_user.php?id=${userId}`).then(data => {
                if (data.user) {
                    const u = data.user;
                    document.getElementById('displayName').innerText = u.name;
                    document.getElementById('displayDepartment').innerText = u.department;
                    document.getElementById('displayBatch').innerText = u.batch;
                    const rating = parseFloat(u.rating) || 0;
                    document.getElementById('displayRating').innerText = rating.toFixed(1);
                    document.getElementById('ratingStars').innerHTML = displayStars(rating);
                    document.getElementById('displayCreated').innerText = new Date(u.created_at).toDateString();
                    if (u.profile_picture && u.profile_picture !== 'default.jpg') {
                        document.getElementById('profilePic').src = 'assets/uploads/' + u.profile_picture;
                    }
                } else {
                    document.getElementById('profileView').innerHTML = '<p>User not found.</p>';
                    document.getElementById('reviewsList').innerHTML = '';
                }
            }).catch(() => document.getElementById('profileView').innerHTML = '<p>Error loading profile.</p>');
            
            // Load user reviews
            fetchAPI(`api/get_user_reviews.php?id=${userId}`).then(reviews => {
                const container = document.getElementById('reviewsList');
                if (!reviews.length) {
                    container.innerHTML = '<p>No reviews yet.</p>';
                    return;
                }
                container.innerHTML = reviews.map(r => `
                    <div class="review-card">
                        <div class="review-header">
                            <span><strong>${escapeHtml(r.reviewer_name)}</strong></span>
                            <span class="review-rating">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                        </div>
                        <div class="review-comment">${escapeHtml(r.comment || 'No comment')}</div>
                        <div class="review-meta">
                            Product: ${escapeHtml(r.product_title || 'General')}<br>
                            ${new Date(r.created_at).toDateString()}
                        </div>
                    </div>
                `).join('');
            }).catch(() => document.getElementById('reviewsList').innerHTML = '<p>Error loading reviews.</p>');
        } else {
            document.getElementById('profileView').innerHTML = '<p>Invalid user ID.</p>';
            document.getElementById('reviewsList').innerHTML = '';
        }
        
        // Report user button
        document.getElementById('reportUserBtn')?.addEventListener('click', () => {
            const overlay = document.createElement('div'); overlay.className = 'modal-overlay';
            overlay.innerHTML = `<div class="modal"><span class="close">&times;</span><h3>Report User</h3><form id="complaintForm"><div class="form-group"><label>Reason / Details</label><textarea name="message" rows="5" required></textarea></div><button type="submit" class="btn">Submit Report</button></form></div>`;
            document.body.appendChild(overlay);
            overlay.querySelector('.close').onclick = () => overlay.remove();
            overlay.querySelector('#complaintForm').onsubmit = async (e) => {
                e.preventDefault();
                const data = { reported_user_id: parseInt(userId), message: e.target.message.value, product_id: 0 };
                try {
                    await fetchAPI('api/file_complaint.php', { method: 'POST', body: JSON.stringify(data), headers: {'Content-Type':'application/json'} });
                    showToast('Complaint filed. Admin will review.', 'success');
                    overlay.remove();
                } catch(err) { showToast(err.message, 'error'); }
            };
        });
    </script>
</body>
</html>
